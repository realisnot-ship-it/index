<title>อัตราการชนะเกม - 168 ช่อง (Live)</title>
<style>
    /* ---------------- ส่วนที่อัปเดตใหม่ (พื้นหลังและมิติ) ---------------- */
    body {
        /* พื้นหลังหลักแบบไล่ระดับสีเข้ม */
        background: radial-gradient(circle at center, #1a1025 0%, #0d0b10 100%);
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 20px;
        position: relative;
        overflow-x: hidden; 
        min-height: 100vh;
    }

    /* สร้างชั้นพื้นหลังเสริมเพื่อเพิ่มมิติ (Pseudo-elements) */
    body::before,
    body::after {
        content: "";
        position: fixed; 
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        z-index: -1; 
        opacity: 0.25; 
        pointer-events: none; /* ป้องกันไม่ให้เลเยอร์นี้บังการคลิก */
    }

    /* ชั้นแรก: ลวดลายตารางไซเบอร์ */
    body::before {
        background-image: 
            linear-gradient(rgba(0, 242, 254, 0.15) 1px, transparent 1px),
            linear-gradient(90deg, rgba(162, 0, 255, 0.15) 1px, transparent 1px);
        background-size: 60px 60px;
        background-position: center;
        transform: perspective(500px) rotateX(20deg); /* ทำให้เส้นดูมีมิติลึกเข้าไป */
    }

    /* ชั้นที่สอง: แสงนีออนออโรร่า (เรืองแสง) */
    body::after {
        background: 
            radial-gradient(circle at 20% 30%, #8a2be2 0%, transparent 35%),
            radial-gradient(circle at 80% 70%, #00f2fe 0%, transparent 35%),
            radial-gradient(circle at 50% 50%, #ff007b 0%, transparent 50%);
        filter: blur(90px); 
        animation: backgroundPulse 15s ease-in-out infinite alternate;
    }

    @keyframes backgroundPulse {
        0% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(2%, 4%) scale(1.05); }
        100% { transform: translate(-2%, -3%) scale(1); }
    }
    /* ----------------------------------------------------------------- */

    /* ส่วนหัวเรื่องแบบรูปภาพโลโก้ */
    .header-logo-container {
        text-align: center;
        margin-bottom: 30px;
        position: relative;
        z-index: 1;
    }

    .header-logo {
        max-width: 350px; /* ปรับขนาดความกว้างสูงสุดของโลโก้ที่นี่ */
        width: 100%;
        height: auto;
        filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2)); /* เพิ่มเงาให้โลโก้ดูโดดเด่น */
    }

    /* ส่วนโครงสร้างคอนเทนต์หลัก */
    .container { 
        display: grid; 
        grid-template-columns: repeat(3, 1fr); 
        gap: 20px; 
        max-width: 1200px; 
        margin: 0 auto; 
        position: relative; 
        z-index: 1; /* ให้อยู่เหนือพื้นหลัง */
    }
    @media (max-width: 900px) { .container { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .container { grid-template-columns: 1fr; } }
    
    /* ปรับปรุงการ์ดให้เป็นสไตล์ Glassmorphism (กึ่งโปร่งใส) เพื่อโชว์แสงพื้นหลัง */
    .card { 
        background: linear-gradient(145deg, rgba(28, 26, 32, 0.8), rgba(18, 16, 22, 0.9)); 
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1); 
        border-radius: 12px; 
        padding: 12px; 
        display: flex; 
        align-items: center; 
        transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease; 
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); 
    }
    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 40px rgba(0, 242, 254, 0.2);
        border-color: rgba(0, 242, 254, 0.4);
    }

    .thumbnail { width: 65px; height: 65px; border-radius: 10px; margin-right: 15px; object-fit: cover; border: 2px solid #222; }
    .info { flex-grow: 1; overflow: hidden; }
    .title { font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rate-text { font-size: 12px; margin-bottom: 6px; color: #bbb; }
    .percent-value { font-size: 14px; font-weight: bold; transition: color 0.5s; text-shadow: 0 0 5px rgba(0,0,0,0.5); }
    .progress-bg { background-color: rgba(0,0,0,0.6); height: 6px; width: 100%; border-radius: 3px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease-in-out, background-color 0.8s, box-shadow 0.8s; }
</style>

    let gameStates = games.map(() => Math.floor(Math.random() * 41) + 50);

    function renderGames() {
        const container = document.getElementById('game-list');
        container.innerHTML = games.map((game, i) => `
            <div class="card">
                <img src="${game.image}" class="thumbnail">
                <div class="info">
                    <div class="title">${game.name}</div>
                    <div class="rate-text">อัตราการชนะ: <span class="percent-value" id="val-${i}"></span></div>
                    <div class="progress-bg">
                        <div class="progress-fill" id="bar-${i}"></div>
                    </div>
                </div>
            </div>
        `).join('');
        updateRates();
    }

    function updateRates() {
        gameStates.forEach((rate, i) => {
            let change = Math.floor(Math.random() * 5) - 2; 
            gameStates[i] = Math.min(Math.max(rate + change, 50), 98);
            const newRate = gameStates[i];
            
            // ปรับสีเปอร์เซ็นต์ให้สว่างขึ้นเข้ากับพื้นหลัง
            const color = newRate >= 75 ? '#00ff88' : (newRate >= 60 ? '#fdb813' : '#ff4d4d');
            
            const textEl = document.getElementById(`val-${i}`);
            const barEl = document.getElementById(`bar-${i}`);
            if(textEl && barEl) {
                textEl.innerText = newRate + "%";
                textEl.style.color = color;
                barEl.style.width = newRate + "%";
                barEl.style.backgroundColor = color;
                barEl.style.boxShadow = `0 0 10px ${color}`;
            }
        });
    }

    renderGames();
    setInterval(updateRates, 2500);

    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) return false;
    }
</script>
